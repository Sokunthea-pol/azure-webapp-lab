<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Azure Web App Lab</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #0078d4; /* Azure Blue color */
        }
        h1 { color: #0078d4; }
        p { font-size: 1.1rem; }
        .status {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #d1e7dd;
            color: #0f5132;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Make a Change Azure Web App Lab</h1>
        <p>Congratulations! Your website is live on Microsoft Azure.</p>
        <div class="status">Status: Online & Running</div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 20px;">
            Deployed via GitHub Repository: azure-webapp-lab
        </p>
    </div>

</body>
</html>
